{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Actividad</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Hubit Logo">
    </div>
  </div>
  <h1 class="top-title" id="activityTitle"></h1>
</header>

<div class="page-content activity-page">

  <div class="activity-card" id="activityContainer">
  </div>

</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'actividades' %}" class="nav-item active">
    <i class="bi bi-grid-fill"></i>
  </a>

  <a href="{% url 'calendario' %}" class="nav-item">
    <i class="bi bi-calendar-event"></i>
  </a>

  <a href="{% url 'reservas' %}" class="nav-item">
    <i class="bi bi-bookmark-check"></i>
  </a>

  <a href="{% url 'cuenta' %}" class="nav-item">
    <i class="bi bi-person"></i>
  </a>
</nav>

<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

document.addEventListener("DOMContentLoaded", function () {

  const id = new URLSearchParams(window.location.search).get("id");

  if (!id) {
    console.error("No se recibió ID en la URL");
    return;
  }

  fetch(`/api/actividad/${id}/`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("activityTitle").textContent = data.nombre;

      const container = document.getElementById("activityContainer");
      container.innerHTML = "";

        if (data.tipo === "libre") {

            container.innerHTML = `
                <h4 class="mb-3">Reserva</h4>

                <div class="mb-3">
                    <label class="form-label fw-bold">Selecciona espacio</label>
                    <select class="form-select" id="espacioSelect"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Fecha</label>
                    <input type="date" class="form-control" id="fechaInput">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Hora inicio</label>
                    <select class="form-select" id="horaInicioSelect"></select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Duración</label>
                    <select class="form-select" id="duracionSelect">
                        <option value="1">1 hora</option>
                        <option value="1.5">1 hora 30 min</option>
                        <option value="2">2 horas</option>
                    </select>
                </div>

                <div class="price-box mb-3">
                    <span>Total</span>
                    <strong id="precioTotal"></strong>
                </div>

                <div id="mensajeBox"></div>

                <button class="btn btn-primary w-100" id="reservarBtn">
                    Reservar
                </button>
            `;

            const espacioSelect = document.getElementById("espacioSelect");
            const duracionSelect = document.getElementById("duracionSelect");
            const precioTotal = document.getElementById("precioTotal");
            const horaSelect = document.getElementById("horaInicioSelect");

            function mostrarMensaje(texto, tipo="success") {
                const mensajeBox = document.getElementById("mensajeBox");
                const color = tipo === "success" ? "alert-success" : "alert-danger";

                mensajeBox.innerHTML = `
                    <div class="alert ${color} mt-2" role="alert">
                        ${texto}
                    </div>
                `;

                setTimeout(() => {
                    mensajeBox.innerHTML = "";
                }, 3000);
            }

            data.espacios.forEach(espacio => {
                const option = document.createElement("option");
                option.value = espacio.id;
                option.textContent = espacio.nombre;
                espacioSelect.appendChild(option);
            });

            function generarHoras() {
                horaSelect.innerHTML = "";

                for (let h = 8; h < 23; h++) {
                    for (let m of [0, 30]) {
                        let hora = String(h).padStart(2, "0");
                        let minuto = String(m).padStart(2, "0");

                        const option = document.createElement("option");
                        option.value = `${hora}:${minuto}`;
                        option.textContent = `${hora}:${minuto}`;

                        horaSelect.appendChild(option);
                    }
                }
            }

            generarHoras();

            function actualizarPrecio() {
                const duracion = parseFloat(duracionSelect.value);
                const precioHora = parseFloat(data.precio);
                precioTotal.textContent = (duracion * precioHora).toFixed(2) + " €";
            }

            duracionSelect.addEventListener("change", actualizarPrecio);
            actualizarPrecio();

            const fechaInput = document.getElementById("fechaInput");
            const hoy = new Date().toISOString().split("T")[0];
            fechaInput.min = hoy;

            document.getElementById("reservarBtn").addEventListener("click", function () {

                const espacio_id = espacioSelect.value;
                const fecha = document.getElementById("fechaInput").value;
                const hora_inicio = horaSelect.value;
                const duracion = duracionSelect.value;

                fetch("/api/reservar-espacio/", {
                    method: "POST",
                    credentials: "same-origin",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCookie("csrftoken")
                    },
                    body: JSON.stringify({
                        espacio_id,
                        fecha,
                        hora_inicio,
                        duracion
                    })
                })
                .then(res => res.json())
                .then(result => {

                    if (result.error) {
                        mostrarMensaje(result.error, "error");
                    } else {
                        mostrarMensaje("Reserva realizada correctamente", "success");
                        generarHoras();
                    }

                });

            });
        }

      if (data.tipo === "bono") {

        const hoy = new Date();
        const dias = [];

        for (let i = 0; i < 7; i++) {
            let fecha = new Date();
            fecha.setDate(hoy.getDate() + i);

            dias.push(fecha.toISOString().split("T")[0]);
        }

        container.innerHTML = `
            <div class="days-scroll mb-3" id="daysContainer"></div>
            <div id="mensajeBox"></div>
            <div id="clasesContainer"></div>
        `;

        const daysContainer = document.getElementById("daysContainer");
        const clasesContainer = document.getElementById("clasesContainer");

        function mostrarMensaje(texto, tipo="success") {
            const mensajeBox = document.getElementById("mensajeBox");
            const color = tipo === "success" ? "alert-success" : "alert-danger";

            mensajeBox.innerHTML = `
                <div class="alert ${color} mt-2">${texto}</div>
            `;

            setTimeout(() => mensajeBox.innerHTML = "", 3000);
        }

        dias.forEach((fecha, index) => {
            const btn = document.createElement("button");
            btn.className = "day-btn " + (index === 0 ? "active" : "");
            const dateObj = new Date(fecha);
            const diaNumero = dateObj.getDate();
            const diaSemana = dateObj.toLocaleDateString("es-ES", { weekday: "short" });

            btn.innerHTML = `
                <span class="day-name">${diaSemana}</span>
                <span class="day-number">${diaNumero}</span>
            `;
            btn.dataset.fecha = fecha;

            btn.addEventListener("click", function () {
                document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                mostrarClases(fecha);
            });

            daysContainer.appendChild(btn);
        });

        function mostrarClases(fechaSeleccionada) {

            clasesContainer.innerHTML = "";

            const clasesDia = data.clases.filter(c => c.fecha === fechaSeleccionada);

            if (clasesDia.length === 0) {
                clasesContainer.innerHTML = "<p>No hay clases este día</p>";
                return;
            }

            clasesDia.forEach(clase => {

                const libre = clase.plazas_ocupadas < clase.plazas_maximas;

                clasesContainer.innerHTML += `
                    <div class="class-card ${libre ? "" : "full"}">

                        <div class="class-main">
                            <strong>${clase.hora_inicio} - ${clase.hora_fin}</strong>
                            <span class="profesor">
                                <i class="bi bi-person"></i>
                                ${clase.monitor}
                            </span>
                        </div>

                        <div class="class-side">
                            <span>${clase.plazas_ocupadas} / ${clase.plazas_maximas}</span>

                            <button 
                                class="btn btn-sm ${libre ? 'btn-primary' : 'btn-secondary'} reservarBtn"
                                data-id="${clase.id}"
                                ${libre ? "" : "disabled"}>
                                ${libre ? "Reservar" : "Completo"}
                            </button>
                        </div>

                    </div>
                `;
            });

            document.querySelectorAll(".reservarBtn").forEach(btn => {
                btn.addEventListener("click", function () {

                    const fechaSeleccionada = document.querySelector(".day-btn.active").dataset.fecha;

                    fetch("/api/reservar/", {
                        method: "POST",
                        credentials: "same-origin",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            horario_id: this.dataset.id,
                            fecha: fechaSeleccionada   
                        })
                    })
                    .then(res => res.json())
                        .then(result => {
                            if (result.error) {
                                mostrarMensaje(result.error, "error");
                            } else {
                                mostrarMensaje("Reserva realizada", "success");

                                const fechaActiva = document.querySelector(".day-btn.active").dataset.fecha;

                               setTimeout(() => {

                                    fetch(`/api/actividad/${id}/`)
                                        .then(res => res.json())
                                        .then(newData => {

                                            data.clases = newData.clases;   

                                            mostrarClases(fechaActiva);   
                                        });

                                }, 500);
                            }
});
                });
            });
        }

        mostrarClases(dias[0]);
    }

    })
    .catch(error => {
      console.error("Error cargando actividad:", error);
    });

});
</script>

</body>
</html>
