{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Centro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Logo">
    </div>
  </div>
  <h1 class="top-title">Panel Centro</h1>
</header>

<div class="page-content-activities-page">

  <div class="activity-selector">

    {% for act in actividades %}

      <a href="{% url 'panel_actividad' act.id %}"
         class="card-cover activity-cover"
         style="background-image: url('{{ act.imagen.url }}')">

        <span class="activity-title">
          {{ act.nombre }}
        </span>

      </a>

    {% endfor %}

  </div>

</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'panel_profesor' %}" class="nav-item active">
    <i class="bi bi-people-fill"></i>
  </a>
  <a href="{% url 'panel_calendario' %}" class="nav-item">
    <i class="bi bi-calendar-week"></i>
  </a>
  <a href="{% url 'panel_espacios' %}" class="nav-item">
    <i class="bi bi-building"></i>
  </a>
  <a href="{% url 'logout' %}" class="nav-item">
    <i class="bi bi-box-arrow-right"></i>
  </a>
  
</nav>

</body>
</html>
