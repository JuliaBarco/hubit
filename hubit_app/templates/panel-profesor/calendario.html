{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Centro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}">
    </div>
  </div>
  <h1 class="top-title">Calendario</h1>
</header>

<div class="page-content-activity">

  <div class="days-scroll mb-4">
    {% for dia in dias %}
      <button class="day-btn"
              onclick="mostrarDia({{ forloop.counter0 }}, this)">
        {{ dia.nombre }}
      </button>
    {% endfor %}
  </div>

  <div id="calendarClases">

    {% for dia in dias %}
      <div class="calendar-day-content dia-{{ forloop.counter0 }}" style="display:none;">

        {% for clase in dia.clases %}
          <div class="calendar-card"
               style="border-left: 4px solid {{ clase.color }}">

            <div class="calendar-time">
              {{ clase.hora_inicio }} - {{ clase.hora_fin }}
            </div>

            <div class="calendar-title">
              {{ clase.actividad }}
            </div>

          </div>
        {% empty %}
          <div class="calendar-empty">
            No hay clases
          </div>
        {% endfor %}

      </div>
    {% endfor %}

  </div>

</div>
<nav class="bottom-nav blue-nav">
  <a href="{% url 'panel_profesor' %}" class="nav-item">
    <i class="bi bi-people-fill"></i>
  </a>
  <a href="{% url 'panel_calendario' %}" class="nav-item active">
    <i class="bi bi-calendar-week"></i>
  </a>
  <a href="{% url 'panel_espacios' %}" class="nav-item">
    <i class="bi bi-building"></i>
  </a>
  <a href="{% url 'logout' %}" class="nav-item">
    <i class="bi bi-box-arrow-right"></i>
  </a>
  
</nav>
<script>
    function mostrarDia(index, boton) {

    document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
    boton.classList.add("active");

    document.querySelectorAll(".calendar-day-content").forEach(el => {
        el.style.display = "none";
    });

    document.querySelector(".dia-" + index).style.display = "block";
    }

    document.addEventListener("DOMContentLoaded", function() {
    const first = document.querySelector(".day-btn");
    if (first) first.click();
    });
</script>
</body>
</html>
