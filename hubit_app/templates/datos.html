{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Datos personales</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Hubit Logo">
    </div>
  </div>
  
  <h1 class="top-title">Datos </h1>
</header>

<div class="page-content datos-page">
    <a href="{% url 'cuenta' %}" class="back-container">
        <i class="bi bi-arrow-left"></i>
    </a>

  <div class="datos-content">

    <form id="datosForm">

      <div class="form-group">
        <label>Nombre</label>
        <input type="text" id="nombre" class="form-control" disabled>
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" id="apellido" class="form-control" disabled>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-control" disabled>
      </div>

      <div class="form-group">
        <label>Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento" class="form-control" disabled>
      </div>

      <div class="form-group">
        <label>Género</label>
        <select id="genero" class="form-select" disabled>
          <option value="F">Femenino</option>
          <option value="M">Masculino</option>
          <option value="O">Otro</option>
        </select>
      </div>

      <div class="datos-buttons">
        <button type="button" class="btn btn-outline-primary" onclick="activarEdicion(event)">
          Editar
        </button>

        <button type="submit" class="btn btn-primary d-none" id="guardarBtn">
          Guardar cambios
        </button>

        <button type="button" class="btn btn-secondary d-none" id="cancelarBtn" onclick="cancelarEdicion()">
          Cancelar
        </button>
      </div>

    </form>

  </div>

</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'actividades' %}" class="nav-item">
    <i class="bi bi-grid-fill"></i>
  </a>

  <a href="{% url 'calendario' %}" class="nav-item">
    <i class="bi bi-calendar-event"></i>
  </a>

  <a href="{% url 'reservas' %}" class="nav-item">
    <i class="bi bi-bookmark-check"></i>
  </a>

  <a href="{% url 'cuenta' %}" class="nav-item active">
    <i class="bi bi-person"></i>
  </a>
</nav>
<script>
  function activarEdicion(e) {
    const inputs = document.querySelectorAll('#datosForm input, #datosForm select');
    inputs.forEach(input => input.disabled = false);

    document.getElementById("guardarBtn").classList.remove("d-none");
    document.getElementById("cancelarBtn").classList.remove("d-none");

    e.target.classList.add("d-none");
  }

  function cancelarEdicion() {
    const inputs = document.querySelectorAll('#datosForm input, #datosForm select');
    inputs.forEach(input => input.disabled = true);

    document.getElementById("guardarBtn").classList.add("d-none");
    document.getElementById("cancelarBtn").classList.add("d-none");

    document.querySelector(".btn-outline-primary").classList.remove("d-none");
  }
  document.addEventListener("DOMContentLoaded", function() {

    fetch("http://127.0.0.1:8000/api/perfil/", {
      credentials: "include"
    })
    .then(response => {
      if (!response.ok) {
        throw new Error("No autenticado");
      }
      return response.json();
    })
    .then(data => {
      document.getElementById("nombre").value = data.nombre;
      document.getElementById("apellido").value = data.apellido;
      document.getElementById("email").value = data.email;
      document.getElementById("fechaNacimiento").value = data.fecha_nacimiento;
      document.getElementById("genero").value = data.genero;
    })
    .catch(error => {
      window.location.href = "inicioSesion.html";
    });
    document.getElementById("datosForm").addEventListener("submit", function(e) {
    e.preventDefault();

    fetch("http://127.0.0.1:8000/api/perfil/", {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({
          nombre: document.getElementById("nombre").value,
          apellido: document.getElementById("apellido").value,
          fecha_nacimiento: document.getElementById("fechaNacimiento").value,
          genero: document.getElementById("genero").value
        })
      })
      .then(response => response.json())
      .then(data => {
        alert("Datos actualizados correctamente");
        location.reload();
      });

    });

  });
  
</script>

</body>
</html>
