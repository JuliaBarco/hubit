{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Mi cuenta</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  
</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Hubit Logo">
    </div>
  </div>
  
  <h1 class="top-title">Mi cuenta</h1>
</header>

<div class="page-content account-page">

  <div class="account-profile">
    <div class="profile-avatar">
      <i class="bi bi-person-fill"></i>
    </div>
    <div class="profile-info">
      <strong id="nombreUsuario"></strong>
      <span id="emailUsuario"></span>
    </div>
  </div>

  <hr>

  <div class="account-list">

    <a href="{% url 'datos' %}" class="account-item">
      <div class="icon blue"><i class="bi bi-person"></i></div>
      <span>Datos personales</span>
      <i class="bi bi-chevron-right arrow"></i>
    </a>

    <a href="{% url 'saldo' %}" class="account-item">
      <div class="icon green"><i class="bi bi-tag"></i></div>
      <span>Saldo</span>
      <i class="bi bi-chevron-right arrow"></i>
    </a>

    <a href="{% url 'compras' %}" class="account-item">
      <div class="icon orange"><i class="bi bi-cart"></i></div>
      <span>Compras</span>
      <i class="bi bi-chevron-right arrow"></i>
    </a>

  </div>

</div>
<div class="mt-4 px-3">
  <button class="btn btn-danger w-100" onclick="cerrarSesion()">
    <i class="bi bi-box-arrow-right me-2"></i>
    Cerrar sesión
  </button>
</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'actividades' %}" class="nav-item">
    <i class="bi bi-grid-fill"></i>
  </a>

  <a href="{% url 'calendario' %}" class="nav-item">
    <i class="bi bi-calendar-event"></i>
  </a>

  <a href="{% url 'reservas' %}" class="nav-item">
    <i class="bi bi-bookmark-check"></i>
  </a>

  <a href="{% url 'cuenta' %}" class="nav-item active">
    <i class="bi bi-person"></i>
  </a>
</nav>
<script>
  function cerrarSesion() {
    localStorage.removeItem("usuarioLogueado");
    window.location.href = "{% url 'login' %}";
  }
  document.addEventListener("DOMContentLoaded", function() {

    const nombre = localStorage.getItem("nombreUsuario");
    const apellido = localStorage.getItem("apellidoUsuario");
    const email = localStorage.getItem("emailUsuario");

    if (nombre && apellido && email) {
      document.getElementById("nombreUsuario").textContent = nombre + " " + apellido;
      document.getElementById("emailUsuario").textContent = email;
    } else {
      window.location.href = "{% url 'login' %}";
    }

  });
</script>
</body>
</html>
