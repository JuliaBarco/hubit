{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Saldo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Hubit Logo">
    </div>
  </div>
  <h1 class="top-title">Saldo</h1>

</header>

<div class="page-content saldo-page">

  <a href="{% url 'cuenta' %}" class="back-container">
      <i class="bi bi-arrow-left"></i>
  </a>

  <div class="bono-section">
    <h5>Bono activo</h5>
    <div class="bono-card">
      <strong id="bonoNombre">Cargando...</strong>
      <span id="bonoCaducidad"></span>
    </div>
  </div>

  <div class="clases-section">
    <h5>Estado de tus clases</h5>

    <div class="clase-item verde">
      <span>Libres</span>
      <strong id="clasesLibres">0</strong>
    </div>

    <div class="clase-item amarillo">
      <span>En uso</span>
      <strong id="clasesEnUso">0</strong>
    </div>

    <div class="clase-item rojo">
      <span>Gastadas</span>
      <strong id="clasesGastadas">0</strong>
    </div>
  </div>

</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'actividades' %}" class="nav-item">
    <i class="bi bi-grid-fill"></i>
  </a>

  <a href="{% url 'calendario' %}" class="nav-item">
    <i class="bi bi-calendar-event"></i>
  </a>

  <a href="{% url 'reservas' %}" class="nav-item">
    <i class="bi bi-bookmark-check"></i>
  </a>

  <a href="{% url 'cuenta' %}" class="nav-item active">
    <i class="bi bi-person"></i>
  </a>
</nav>
<script>
document.addEventListener("DOMContentLoaded", function() {

  fetch("/api/mi-bono/", { credentials: "include" })
    .then(res => res.json())
    .then(data => {

      if (data.nombre) {

        document.getElementById("bonoNombre").textContent = data.nombre;

        document.getElementById("bonoCaducidad").textContent =
          "Válido hasta " + data.fecha_caducidad;

        document.getElementById("clasesLibres").textContent =
          data.clases_restantes;

        document.getElementById("clasesEnUso").textContent =
          data.en_uso;

        document.getElementById("clasesGastadas").textContent =
          data.gastadas;

      } else {
        document.getElementById("bonoNombre").textContent =
          "No tienes bono activo";
      }

    })
    .catch(() => {
      document.getElementById("bonoNombre").textContent =
        "Error cargando bono";
    });

});
</script>
</body>
</html>
