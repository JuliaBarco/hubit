{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Registro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>
<body>

  <div class="gradient-bg">

    <div class="text-center mb-4">
      <img src="{% static 'img/LogoSinFondo.png' %}" class="logo" alt="Hubit Logo">
      <h1 class="app-title">Hubit</h1>
      <p class="tagline">Empieza tu progreso hoy</p>
    </div>

    <div class="card">

      <h4 class="mb-3">Crear cuenta</h4>
      <div id="registroMessage"></div>
      <p class="mb-4">
        Regístrate para empezar 
      </p>

      <form id="registroForm">

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Nombre</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person-fill"></i>
            </span>
            <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Apellidos</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input
              type="text"
              id="apellidos"
              class="form-control"
              placeholder="Tus apellidos"
              required
            />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Fecha de nacimiento</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-calendar"></i>
            </span>
            <input
              type="date"
              id="fechaNacimiento"
              class="form-control"
              required
            />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Género</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-gender-ambiguous"></i>
            </span>
            <select id="genero" class="form-select" required>
              <option value="">Selecciona tu género</option>
              <option value="M">Masculino</option>
              <option value="F">Femenino</option>
              <option value="O">Otro</option>
            </select>
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>
            <input type="email" id="email" class="form-control" placeholder="ejemplo@email.com" required />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Repetir contraseña</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input type="password" id="password2" class="form-control" placeholder="••••••••" required />
          </div>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Centro deportivo</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-building"></i>
            </span>
            <select class="form-select" id="centro" required></select>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-person-plus-fill me-2"></i>
            Crear cuenta
          </button>
        </div>

      </form>

      <p class="mt-3 mb-0">
        ¿Ya tienes cuenta?
        <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">
          Iniciar sesión
        </a>
      </p>
      

    </div>

  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {

      fetch('/api/centros/')
        .then(response => response.json())
        .then(data => {

          const select = document.getElementById("centro");
          select.innerHTML = '<option value="" disabled selected>Selecciona tu centro</option>';

          data.forEach(centro => {
            const option = document.createElement("option");
            option.value = centro.id;
            option.textContent = centro.nombre;
            select.appendChild(option);
          });

        });


      document.getElementById("registroForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const nombre = document.getElementById("nombre").value;
        const apellidos = document.getElementById("apellidos").value;
        const fechaNacimiento = document.getElementById("fechaNacimiento").value;
        const genero = document.getElementById("genero").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const password2 = document.getElementById("password2").value;
        const centro = document.getElementById("centro").value;

        if (password !== password2) {

          const messageBox = document.getElementById("registroMessage");

          messageBox.innerHTML = `
            <div class="alert alert-danger mt-3" role="alert">
              Las contraseñas no coinciden
            </div>
          `;

          return;
        }
        if (!centro) {
          const messageBox = document.getElementById("registroMessage");

          messageBox.innerHTML = `
            <div class="alert alert-danger mt-3">
              Debes seleccionar un centro
            </div>
          `;
          return;
        }

        fetch('/api/registro/', {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
       body: JSON.stringify({
          nombre,
          apellidos,
          email,
          password,
          fecha_nacimiento: fechaNacimiento,
          genero,
          centro
        })
      })
      .then(async response => {
        const data = await response.json();

        if (!response.ok) {
          console.log("ERROR BACKEND:", data); 
          throw new Error(data.error || "Error al registrar");
        }

        return data;
      })
      .then(data => {             

        const messageBox = document.getElementById("registroMessage");

        messageBox.innerHTML = `
          <div class="alert alert-success mt-3" role="alert">
            ${data.mensaje}
          </div>
        `;

        setTimeout(() => {
          window.location.href = "{% url 'login' %}";
        }, 2000);
      })
      .catch(error => {
        const messageBox = document.getElementById("registroMessage");

        messageBox.innerHTML = `
          <div class="alert alert-danger mt-3" role="alert">
            ${error.message}
          </div>
        `;
      });

      });

    });
  </script>
</body>
</html>
