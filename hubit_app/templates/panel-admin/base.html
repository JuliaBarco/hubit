{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Admin - Hubit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>

<body>

<div class="d-flex">

  <div class="bg-primary text-white p-4" style="width:250px;min-height:100vh;">
    <h4 class="mb-4">Hubit Admin</h4>

    <ul class="nav flex-column">
      <li class="nav-item mb-2">
        <a href="{% url 'admin_actividades' %}" class="nav-link text-white">Actividades</a>
      </li>
      <li class="nav-item mb-2">
        <a href="{% url 'admin_profesores' %}" class="nav-link text-white">Profesores</a>
      </li> 
      <li class="nav-item mb-2">
        <a href="{% url 'admin_horarios_centro' %}" class="nav-link text-white">
          Horario Centro
        </a>
      </li>
      <li class="nav-item mb-2">
        <a href="{% url 'admin_bonos' %}" class="nav-link text-white">
        Bonos
        </a>
      </li>
    </ul>
  </div>

  <div class="flex-fill p-4">
    {% block content %}{% endblock %}
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
