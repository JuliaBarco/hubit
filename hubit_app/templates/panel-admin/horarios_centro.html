{% extends "panel-admin/base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">Horario del Centro</h2>

<button class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#modalHorario">
+ Nuevo horario
</button>

<table class="table">

<thead>
<tr>
<th>Día</th>
<th>Inicio</th>
<th>Fin</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>
{% for h in horarios %}

<tr>

<td>{{ h.get_dia_semana_display }}</td>
<td>{{ h.hora_inicio }}</td>
<td>{{ h.hora_fin }}</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="eliminarHorario({{ h.id }})">
Eliminar
</button>
</td>

</tr>

{% endfor %}

</tbody>
</table>
</table>

<div class="modal fade" id="modalHorario" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content rounded-4">

      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Nuevo horario del centro</h5>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form id="formHorarioCentro">

          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Día</label>
            <select class="form-select" name="dia_semana">
              <option value="0">Lunes</option>
              <option value="1">Martes</option>
              <option value="2">Miércoles</option>
              <option value="3">Jueves</option>
              <option value="4">Viernes</option>
              <option value="5">Sábado</option>
              <option value="6">Domingo</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Hora inicio</label>
            <input type="time" class="form-control" name="hora_inicio" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Hora fin</label>
            <input type="time" class="form-control" name="hora_fin" required>
          </div>

          <button type="submit"
                  class="btn btn-primary w-100 rounded-pill">
            Guardar horario
          </button>

        </form>

      </div>

    </div>
  </div>
</div>

<script>
document.getElementById("formHorarioCentro").addEventListener("submit", function(e){

    e.preventDefault();

    let formData = new FormData(this);

    fetch("{% url 'admin_crear_horario_centro' %}",{
        method:"POST",
        body:formData
    })
    .then(res => res.json())
    .then(data => {
        location.reload();
    });

});
</script>

<script>
function eliminarHorario(id){

    if(!confirm("¿Eliminar este horario?")){
        return;
    }

    fetch(`/panel-admin/eliminar-horario-centro/${id}/`)
    .then(res => res.json())
    .then(data => {
        location.reload()
    })

}
</script>

{% endblock %}
