{% extends "panel-admin/base.html" %}

{% block content %}

<h2 class="fw-bold mb-4">Bonos</h2>

<button class="btn btn-primary mb-3"
data-bs-toggle="modal"
data-bs-target="#modalBono">
+ Nuevo bono
</button>

<table class="table">

<thead>
<tr>
<th>Nombre</th>
<th>Clases</th>
<th>Precio</th>
<th>Acciones</th>
</tr>
</thead>

<tbody>

{% for b in bonos %}

<tr>

<td>{{ b.nombre }}</td>
<td>{{ b.clases_totales }}</td>
<td>{{ b.precio }} €</td>

<td>
<button class="btn btn-danger btn-sm"
onclick="eliminarBono({{ b.id }})">
Eliminar
</button>
</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="modal fade" id="modalBono">

<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Nuevo bono</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<input type="text" id="nombreBono"
class="form-control mb-2"
placeholder="Nombre">

<input type="number" id="clasesBono"
class="form-control mb-2"
placeholder="Número de clases">

<input type="number" step="0.01" id="precioBono"
class="form-control"
placeholder="Precio">

</div>

<div class="modal-footer">

<button class="btn btn-primary"
onclick="crearBono()">
Guardar
</button>

</div>

</div>
</div>
</div>
<script>

function crearBono(){

let nombre = document.getElementById("nombreBono").value
let clases = document.getElementById("clasesBono").value
let precio = document.getElementById("precioBono").value

fetch("/panel-admin/crear-bono/",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded",
"X-CSRFToken":"{{ csrf_token }}"
},

body:`nombre=${nombre}&clases=${clases}&precio=${precio}`

})
.then(res=>res.json())
.then(data=>{

location.reload()

})

}

function eliminarBono(id){

fetch("/panel-admin/eliminar-bono/"+id+"/")
.then(res=>res.json())
.then(data=>{

location.reload()

})

}

</script>
{% endblock %}
