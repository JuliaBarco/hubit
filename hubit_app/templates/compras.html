{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Compras</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  
</head>

<body>

<header class="top-bar">
  <div class="top-left">
    <div class="logo-circle">
      <img src="{% static 'img/LogoSinFondo.png' %}" alt="Hubit Logo">
    </div>
  </div>
  
  <h1 class="top-title">Compras</h1>
</header>

<div class="page-content compras-page">

    <a href="{% url 'cuenta' %}" class="back-container">
        <i class="bi bi-arrow-left"></i>
    </a>

  <h5 class="mb-4">Bonos disponibles</h5>

  <div id="bonosContainer"></div>

</div>

<nav class="bottom-nav blue-nav">
  <a href="{% url 'actividades' %}" class="nav-item">
    <i class="bi bi-grid-fill"></i>
  </a>

  <a href="{% url 'calendario' %}" class="nav-item">
    <i class="bi bi-calendar-event"></i>
  </a>

  <a href="{% url 'reservas' %}" class="nav-item">
    <i class="bi bi-bookmark-check"></i>
  </a>

  <a href="{% url 'cuenta' %}" class="nav-item active">
    <i class="bi bi-person"></i>
  </a>
</nav>
<div id="appModal" class="custom-modal">
  <div class="modal-content-box">
    <p id="appModalMessage"></p>

    <div class="modal-buttons">
      <button id="appModalBtn" class="btn-confirm">Aceptar</button>
    </div>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function() {

  fetch("/api/bonos/", {
    credentials: "include"
  })
    .then(res => res.json())
    .then(bonos => {

      const container = document.getElementById("bonosContainer");

      if (!Array.isArray(bonos) || bonos.length === 0) {
        container.innerHTML = "<p>No hay bonos disponibles</p>";
        return;
      }

      bonos.forEach(bono => {

        const div = document.createElement("div");
        div.classList.add("bono-compra");

        div.innerHTML = `
          <div class="bono-info">
            <h6>${bono.nombre}</h6>
            <p>${bono.clases_totales} clases</p>
          </div>
          <div class="bono-precio">
            <strong>${bono.precio} €</strong>
            <button class="btn btn-primary btn-sm" onclick="comprar(${bono.id})">
              Comprar
            </button>
          </div>
        `;

        container.appendChild(div);
      });

    });

});

function comprar(bonoId) {

  fetch("/api/comprar-bono/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ bono_id: bonoId })
  })
  .then(res => res.json())
  .then(data => {

    if (data.mensaje) {
      mostrarModal("Bono comprado correctamente", true);
    } else {
      mostrarModal(data.error || "Error al comprar", false);
    }

  });

}
function mostrarModal(mensaje, redirigir=false) {

  const modal = document.getElementById("appModal");
  const message = document.getElementById("appModalMessage");
  const btn = document.getElementById("appModalBtn");

  message.innerText = mensaje;
  modal.classList.add("show");

  btn.onclick = function() {
    modal.classList.remove("show");

    if (redirigir) {
      window.location.href = "{% url 'saldo' %}";
    }
  };
}
</script>
</body>
</html>
