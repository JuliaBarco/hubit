{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Iniciar sesión</title>

   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  
</head>

<body>

  <div class="gradient-bg">

    <div class="text-center mb-4">
      <img src="{% static 'img/LogoSinFondo.png' %}" class="logo" alt="Hubit Logo">
      <h1 class="app-title">Hubit</h1>
      <p class="tagline">Tu plataforma deportiva inteligente</p>
    </div>

    <div class="card">

      <h4 class="mb-3">Iniciar sesión</h4>
      <div id="loginMessage"></div>

      <form id="loginForm">

        <div class="mb-3 text-start">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="ejemplo@email.com"
              required
            />
          </div>
        </div>

        <div class="mb-4 text-start">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              id="password"
              class="form-control"
              placeholder="••••••••"
              required
            />
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Entrar
          </button>
        </div>

      </form>

      <p class="mt-3 mb-0">
        ¿No tienes cuenta?
        <a href="{% url 'registro' %}" class="fw-semibold text-decoration-none">
          Crear cuenta
        </a>
      </p>

    </div>

  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function() {

      const form = document.getElementById("loginForm");
      const messageBox = document.getElementById("loginMessage");

      form.addEventListener("submit", function(e) {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        fetch("/api/login/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ email, password })
        })
        .then(response => {
          if (!response.ok) {
            throw new Error("Login incorrecto");
          }
          return response.json();
        })
        .then(data => {

          localStorage.setItem("nombreUsuario", data.nombre);
          localStorage.setItem("apellidoUsuario", data.apellido);
          localStorage.setItem("emailUsuario", data.email);

          if (data.redirect) {
            window.location.href = data.redirect;
          } else {
            window.location.href = "/actividades/";
          }
        })
        .catch(error => {
          messageBox.innerHTML = `
            <div class="alert alert-danger mt-3" role="alert">
              ${error.message}
            </div>
          `;

          setTimeout(() => {
            messageBox.innerHTML = "";
          }, 3000);
        });

      });

    });
  </script>
</body>
</html>
