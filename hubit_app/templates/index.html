{% load static %} <!--Accede a elementos estaticos como CSS -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hubit - Bienvenido</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  
</head>

<body>
  <div class="d-flex flex-column justify-content-center align-items-center vh-100 gradient-bg">

    <div class="text-center mb-4">
      <img src="{% static 'img/LogoSinFondo.png' %}" class="logo" alt="Hubit Logo">
      <h1 class="app-title">Hubit</h1>
    </div>

    <div class="card app-card form-card">
      <h4 class="fw-semibold mb-3 text-primary">¡Bienvenido!</h4>
      <p class="text-muted mb-4">
        Inicia sesión o crea tu cuenta para acceder a tus actividades deportivas
      </p>

      <div class="d-grid gap-3">
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg rounded-pill">
          <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar sesión
        </a>

        <a href="{% url 'registro' %}" class="btn btn-outline-primary btn-lg rounded-pill">
          <i class="bi bi-person-plus me-2"></i> Crear cuenta
        </a>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
